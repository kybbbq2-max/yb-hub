<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YB HUB</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PORTAL -->
<section id="portal" class="screen active portal">
  <div class="portal-overlay"></div>

  <div class="portal-content">
    <div class="brand-box glass">
      <h1>YB HUB</h1>
      <p>Premium Life & Work Operating Space</p>
    </div>

    <div class="portal-actions">
      <button class="glass portal-btn" onclick="showScreen('lifeLogin')">
        <span>🐶</span>
        <div>
          <strong>LIFE SPACE</strong>
          <small>오늘 하루 정리하기</small>
        </div>
      </button>

      <button class="glass portal-btn" onclick="showScreen('workLogin')">
        <span>🏢</span>
        <div>
          <strong>WORK SPACE</strong>
          <small>업무 시작하기</small>
        </div>
      </button>
    </div>
  </div>
</section>

<!-- LIFE LOGIN -->
<section id="lifeLogin" class="screen life">
  <div class="login-shell">
    <div class="login-card">
      <h2>🐶 LIFE LOGIN</h2>
      <p>🖤 밤비 / 🤍 탄이</p>
      <input id="lifePw" type="password" placeholder="LIFE 비밀번호">
      <button class="life-btn" onclick="loginLife()">입장</button>
      <button class="ghost-btn" onclick="showScreen('portal')">뒤로</button>
    </div>
  </div>
</section>

<!-- WORK LOGIN -->
<section id="workLogin" class="screen work">
  <div class="login-shell">
    <div class="login-card">
      <h2>🏢 WORK LOGIN</h2>
      <input id="workPw" type="password" placeholder="WORK 비밀번호">
      <button class="work-btn" onclick="loginWork()">입장</button>
      <button class="ghost-btn" onclick="showScreen('portal')">뒤로</button>
    </div>
  </div>
</section>

<!-- LIFE MAIN -->
<section id="lifeMain" class="screen life">
  <header class="life-header">
    <h1>Good Evening, YB</h1>
    <button class="ghost-btn" onclick="showScreen('portal')">나가기</button>
  </header>

  <div class="life-grid">
    <div class="card">
      <h3>🔮 오늘 운세</h3>
      <p id="fortuneText"></p>
      <p id="avoidanceText"></p>
    </div>

    <div class="card">
      <h3>😊 오늘 기분</h3>
      <div class="mood-row">
        <button onclick="setMood('🙂')">🙂</button>
        <button onclick="setMood('😐')">😐</button>
        <button onclick="setMood('😩')">😩</button>
        <button onclick="setMood('😡')">😡</button>
      </div>
      <p id="moodResult"></p>
    </div>

    <div class="card">
      <h3>📅 일정</h3>
      <input id="calendarText" placeholder="일정 추가">
      <button class="life-btn" onclick="addCalendar()">추가</button>
      <ul id="calendarList"></ul>
    </div>

    <div class="card">
      <h3>📝 일기</h3>
      <textarea id="diaryText" rows="8"></textarea>
      <button class="life-btn" onclick="saveDiary()">저장</button>
    </div>
  </div>
</section>

<!-- WORK MAIN -->
<section id="workMain" class="screen work">
  <div class="work-layout">
    <aside class="sidebar">
      <h2>YB WORK</h2>
      <button>📅 캘린더</button>
      <button>👷 기사관리</button>
      <button>🚚 차량지원</button>
      <button>📝 SAP</button>
      <button class="ghost-btn" onclick="showScreen('portal')">로그아웃</button>
    </aside>

    <main class="work-main">
      <div class="kpi-grid">
        <div class="kpi-card">출하 <strong id="shipCount">0</strong></div>
        <div class="kpi-card">반품 <strong id="returnCount">0</strong></div>
        <div class="kpi-card">점검 <strong id="inspectCount">0</strong></div>
      </div>

      <div class="card">
        <h3>업무 등록</h3>
        <input id="taskTitle" placeholder="제목">
        <select id="taskType">
          <option>출하</option>
          <option>반품</option>
          <option>공장점검</option>
          <option>차량지원</option>
          <option>SAP</option>
        </select>
        <input id="taskOwner" placeholder="담당자">
        <textarea id="taskMemo"></textarea>
        <button class="work-btn" onclick="saveTask()">저장</button>
      </div>

      <div class="card">
        <h3>검색</h3>
        <input id="searchInput" placeholder="검색" onkeyup="renderTasks()">
      </div>

      <div class="card">
        <h3>업무 DB</h3>
        <div id="taskList"></div>
      </div>
    </main>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
