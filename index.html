<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>YB HUB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="portal" class="screen active portal">
  <div class="hero">
    <h1>YB HUB</h1>
    <p>나만의 LIFE / WORK HUB</p>
  </div>

  <div class="card">
    <button class="life-btn" onclick="showScreen('lifeLogin')">🐶 LIFE SPACE</button>
    <button class="work-btn" onclick="showScreen('workLogin')">🏢 WORK SPACE</button>
  </div>
</div>

<div id="lifeLogin" class="screen life">
  <div class="card login-card">
    <h2>🐶 LIFE LOGIN</h2>
    <div class="dogs">🖤 밤비 & 🤍 탄이</div>
    <input id="lifePw" type="password" placeholder="LIFE 비밀번호">
    <button class="life-btn" onclick="loginLife()">입장</button>
    <button class="ghost-btn" onclick="showScreen('portal')">뒤로</button>
  </div>
</div>

<div id="workLogin" class="screen work">
  <div class="card login-card">
    <h2>🏢 WORK LOGIN</h2>
    <input id="workPw" type="password" placeholder="WORK 비밀번호">
    <button class="work-btn" onclick="loginWork()">입장</button>
    <button class="ghost-btn" onclick="showScreen('portal')">뒤로</button>
  </div>
</div>

<div id="lifeMain" class="screen life">
  <div class="topbar">
    <h2>🐶 LIFE SPACE</h2>
    <button class="ghost-btn" onclick="showScreen('portal')">나가기</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>🔮 오늘 운세 HUB</h3>
      <p id="fortuneText"></p>
      <p id="avoidanceText"></p>
    </div>

    <div class="card">
      <h3>😊 오늘 기분</h3>
      <div class="mood-row">
        <button onclick="setMood('🙂')">🙂</button>
        <button onclick="setMood('😐')">😐</button>
        <button onclick="setMood('😩')">😩</button>
        <button onclick="setMood('😡')">😡</button>
      </div>
      <p id="moodResult"></p>
    </div>
  </div>

  <div class="card">
    <h3>📅 주간 일정</h3>
    <div class="calendar-add">
      <input id="calendarText" placeholder="일정 입력">
      <button class="life-btn" onclick="addCalendar()">추가</button>
    </div>
    <ul id="calendarList"></ul>
  </div>

  <div class="card">
    <h3>📝 일기</h3>
    <textarea id="diaryText" rows="8" placeholder="오늘 있었던 일"></textarea>
    <button class="life-btn" onclick="saveDiary()">일기 저장</button>
  </div>
</div>

<div id="workMain" class="screen work">
  <div class="topbar">
    <h2>🏢 WORK SPACE</h2>
    <button class="ghost-btn" onclick="showScreen('portal')">나가기</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>👷 기사 관리</h3>
      <input id="driverSearch" placeholder="기사 검색" onkeyup="searchDrivers()">
      <div id="driverList"></div>
    </div>

    <div class="card">
      <h3>🔔 공장점검 알림</h3>
      <input id="alarmTitle" value="공장점검">
      <input id="alarmTime" value="10:00">
      <button class="work-btn" onclick="requestNotification()">알림 허용</button>
      <button class="work-btn" onclick="testAlarm()">5분전 테스트</button>
    </div>
  </div>

  <div class="card">
    <h3>🚚 차량 지원</h3>
    <textarea id="supportMemo" rows="4" placeholder="차량 지원 메모"></textarea>
    <button class="work-btn" onclick="saveSupport()">저장</button>
  </div>

  <div class="card">
    <h3>📝 SAP 퀵메모</h3>
    <textarea id="sapMemo" rows="4" placeholder="SAP 메모"></textarea>
    <button class="work-btn" onclick="saveSap()">저장</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
